{% extends "home.html" %}

{% block title %} <title>Cadastro</title> {% endblock %}

{% block content %}
<form method="post">
    {% csrf_token %}
    <table align="center" border="0" cellpadding="10" cellspacing="0">
    <tr>
        <td colspan="2" align="center"><h1>Cadastro do Usuário</h1></td>
    </tr>
    <tr>
        <td align="right"> <label for="username">Usuário:</label> </td>
        <td> {{ username }} </td>
    </tr>
    <tr>
        <td align="right"> <label for="first_name">Nome:</label> </td>
        <td> <input type="text" id="first_name" name="first_name" required> </td>
    </tr>
    <tr>
        <td align="right"> <label for="last_name">Sobrenome:</label> </td>
        <td> <input type="text" id="last_name" name="last_name" required> </td>
    </tr>
    <tr>
        <td align="right"> <label for="is_staff">Permissões:</label> </td>
        <td> {{ is_staff }} </td>
    </tr>    
    <tr>
        <td align="right"> <label for="is_active">Status:</label> </td>
        <td> {{ is_active }} </td>
    </tr>    
     <tr>
        <td align="right"> <label for="date_joined">Data de Registro:</label> </td>
        <td> {{ date_joined }} </td>
    </tr>      
    <tr>
        <td align="right"> <label for="email">Email:</label> </td>
        <td> <input type="email" id="email" name="email" required> </td>
    </tr>
    <tr>
        <td align="right"> <label for="password">Senha:</label> </td>
        <td> <input type="password" id="password" name="password" required> </td>
    </tr>
    <tr>
        <td></td>
        <td align="center"> <button type="submit">Salvar Dados</button> </td>
    </tr>
    </table>
</form>        
{% endblock %}
