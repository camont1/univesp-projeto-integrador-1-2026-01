<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Cadastro de Usuário</title>

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {

            font-family: Arial, Helvetica, sans-serif;

            background:
                linear-gradient(
                    135deg,
                    #111827,
                    #1f2937
                );

            min-height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;

            padding: 24px;
        }

        .container {

            width: 100%;
            max-width: 420px;

            background: white;

            border-radius: 16px;

            padding: 40px;

            box-shadow:
                0 10px 30px rgba(0,0,0,0.2);
        }

        .logo {

            width: 70px;
            height: 70px;

            background: #111827;

            color: white;

            display: flex;
            justify-content: center;
            align-items: center;

            border-radius: 50%;

            margin: 0 auto 24px;

            font-size: 24px;
            font-weight: bold;
        }

        h1 {

            text-align: center;

            color: #111827;

            margin-bottom: 8px;

            font-size: 28px;
        }

        .subtitle {

            text-align: center;

            color: #6b7280;

            margin-bottom: 32px;

            font-size: 14px;
        }

        form {

            display: flex;
            flex-direction: column;

            gap: 18px;
        }

        .field {

            display: flex;
            flex-direction: column;

            gap: 6px;
        }

        label {

            font-size: 14px;
            font-weight: bold;

            color: #374151;
        }

        input,
        select {

            width: 100%;

            padding: 14px;

            border: 1px solid #d1d5db;

            border-radius: 10px;

            font-size: 14px;

            transition: 0.2s;
        }

        input:focus,
        select:focus {

            outline: none;

            border-color: #111827;

            box-shadow:
                0 0 0 4px rgba(17,24,39,0.1);
        }

        button {

            margin-top: 12px;

            padding: 14px;

            border: none;

            border-radius: 10px;

            background: #111827;

            color: white;

            font-size: 15px;
            font-weight: bold;

            cursor: pointer;

            transition: 0.2s;
        }

        button:hover {

            background: #374151;
        }

        .error {

            background: #fee2e2;

            color: #b91c1c;

            padding: 12px;

            border-radius: 8px;

            font-size: 14px;
        }

        .footer {

            margin-top: 24px;

            text-align: center;

            color: #6b7280;

            font-size: 13px;
        }

    </style>

</head>
<body>

<div class="container">

    <div class="logo">
        U
    </div>

    <h1>Criar Conta</h1>

    <p class="subtitle">
        Preencha os dados abaixo para criar sua conta
    </p>

    {% if error %}
        <div class="error">
            {{ error }}
        </div>
    {% endif %}

    <form method="POST">

        {% csrf_token %}

        <div class="field">

            <label>
                Nome
            </label>

            {{ form.name }}

        </div>

        <div class="field">

            <label>
                E-mail
            </label>

            {{ form.email }}

        </div>

        <div class="field">

            <label>
                Senha
            </label>

            {{ form.password }}

        </div>

        <button type="submit">
            Criar Usuário
        </button>

    </form>

    <div class="footer">
        Sistema de Cadastro Django
    </div>

</div>

</body>
</html>
